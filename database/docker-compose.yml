version: '3.8'
services: 
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: reservas
    ports: 
      - "5433:5432"
    #volumes:
      #inserir aqui os arquivo de SEED'
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_aula
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
